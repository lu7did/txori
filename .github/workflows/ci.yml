name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Ruff
        run: ruff check .
      - name: Black
        run: |
          set -e
          out="$(black --check src/txori 2>&1)" || rc=$?
          echo "$out"
          if [ "${rc:-0}" -ne 0 ]; then
            if echo "$out" | grep -q "Python 3.12.5 has a memory safety issue"; then
              echo "::warning::Black: memoria insegura en Python 3.12.5; tratando como warning"
              exit 0
            fi
            if echo "$out" | grep -q "would reformat"; then
              echo "::warning::Black: halló archivos que reformatear (tratado como warning)" 
              echo "$out"
              exit 0
            fi
            exit "$rc"
          fi
      - name: MyPy
        run: mypy src
      - name: Bandit
        run: bandit -r src -q -ll
      - name: PyTest
        run: pytest
      - name: Build docs with pdoc
        run: |
          pdoc -o docs src/txori
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs
