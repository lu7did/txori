[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "txori"
version = "0.1.3"
description = "Procesamiento de señales en tiempo casi-real: captura, filtrado, análisis FFT y visualización."
readme = "README.md"
requires-python = ">=3.12"
authors = [
  {name = "Txori Devs", email = "devnull@example.com"}
]
license = {file = "LICENSE"}
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.12",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Topic :: Scientific/Engineering :: Information Analysis",
]
dependencies = [
  "numpy>=1.26",
  "pillow>=10.0",
]

[project.optional-dependencies]
audio = ["sounddevice>=0.4.6"]
viz = ["matplotlib>=3.8"]

dynamic = ["urls"]

[project.urls]
Homepage = "https://github.com/your-org/txori"
Issues = "https://github.com/your-org/txori/issues"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 88
target-version = ["py312"]

[tool.ruff]
line-length = 88
src = ["src"]
fix = false

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "D", "B", "C90"]
ignore = [
  "D100",  # Missing docstring in public module
  "D104",  # Missing docstring in public package
  "D102",  # Missing docstring in public method
  "D103",  # Missing docstring in public function
  "D105",  # Missing docstring in magic method
  "D107",  # Missing docstring in __init__
  "E501",  # Line too long (confiamos en Black)
]


[tool.ruff.lint.pydocstyle]
convention = "pep257"

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["D"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_reexport = true
check_untyped_defs = true
mypy_path = "src"
explicit_package_bases = true
[[tool.mypy.overrides]]
module = ["matplotlib.*", "txori.testwave"]
ignore_missing_imports = true
exclude = "^src/testwave\.py$"

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra -q --cov=txori --cov-report=term-missing:skip-covered"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["txori"]

[tool.coverage.report]
omit = [
  "tests/*",
]
precision = 2
fail_under = 79

[tool.bandit]
skips = ["B101"]
